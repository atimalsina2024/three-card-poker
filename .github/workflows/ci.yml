name: Three Card Poker CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main] 
jobs:

  unit-tests:
    runs-on: ubuntu-latest
    steps: 
      - name: checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Run JUnit 5 unit tests
        run: mvn test

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-unit
          path: allure-results/

  api-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:  
          java-version: '17'
          distribution: 'temurin'

      - name: Start Spring Boot App
        run: mvn spring-boot:run &
      - name: wait for app to start
        run: sleep 20

      - name: Run RestAssured API Tests
        run: mvn test -Dtest=DealApiTest,EvaluateApiNegativeTest,EvaluateApiTest

      - name: Upload API Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results
          path: target/surefire-reports/

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-api
          path: allure-results/

  publish-reports:
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests]
    if: always()
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Download unit test Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-unit
          path: allure-results/

      - name: Download API test Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-api
          path: allure-results/

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results/
          allure_report: allure-reports/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN  }}
          publish_dir: allure-history
          keep_files: true

